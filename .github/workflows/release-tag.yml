name: Release Tagged Release

# on:
#   release:
#     types: [published]
on: 
  pull_request:
    

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

concurrency:
  # group: ${{ github.event.release.tag_name }}
  group: ${{ github.head_ref }}

  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # ref: ${{ github.event.release.tag_name }}
          ref: ${{ github.head_ref }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Publish oct-cloud
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p oct-cloud
          
      - name: Publish oct-orchestrator
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p oct-orchestrator
          
      - name: Publish oct-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p oct-cli

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Build Python package with uv
        run: uv build --out-dir target/wheels crates/oct-py

      - name: Publish oct-py to PyPI with uv
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish --verbose target/wheels/*

